<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tiny App Store Release Checker</title>
<style>
body{font-family:system-ui;margin:32px;max-width:860px}
textarea{width:100%;height:220px}
pre{background:#111;color:#f5f5f5;padding:16px;white-space:pre-wrap}
button{padding:10px 14px}
</style>
<h1>Tiny App Store Release Checker</h1>
<textarea id="input">{"agreements":"active","bundleId":"com.example.app","version":"1.0 build 1","screenshots":"6.7-inch, 6.5-inch, iPad"}</textarea>
<p><button id="run">Check</button></p>
<pre id="output"></pre>
<script>
const gates = ["agreements","bundleId","version","screenshots","privacy","metadata","build","reviewNotes","iap"];
const labels = {
  agreements: "Apple agreements, tax, and banking are active",
  bundleId: "Bundle ID is final",
  version: "Version and build number are set",
  screenshots: "Screenshots exist for required device sizes",
  privacy: "Privacy answers and privacy manifest are complete",
  metadata: "Name, subtitle, keywords, description, support URL are ready",
  build: "A reviewable build is selected",
  reviewNotes: "Review notes and demo account are ready when needed",
  iap: "IAP or subscription products are configured, if used"
};
const truthyValue = value => {
  if (value == null) return false;
  if (typeof value === "boolean") return value;
  if (typeof value === "string") return !["", "0", "false", "no", "missing"].includes(value.trim().toLowerCase());
  return Boolean(value);
};
const requiredScreenshots = meta => {
  const devices = String(meta.supportedDevices || meta.devices || "iphone,ipad").toLowerCase();
  if (devices.includes("iphone") && !devices.includes("ipad")) return ["6.7", "6.5"];
  if (devices.includes("ipad") && !devices.includes("iphone")) return ["iPad"];
  return ["6.7", "6.5", "iPad"];
};
const screenshotGroups = value => {
  const tokens = (Array.isArray(value)
    ? value.flatMap(item => typeof item === "string" ? item.split(/[^A-Za-z0-9.]+/) : [item.device, `${item.width || ""}x${item.height || ""}`])
    : String(value || "").split(/[^A-Za-z0-9.]+/)).filter(Boolean).map(token => String(token).toLowerCase());
  return ["6.7","6.5","iPad"].filter(group => tokens.includes(group.toLowerCase()));
};
document.querySelector("#run").onclick = () => {
  try {
    const meta = JSON.parse(document.querySelector("#input").value);
    document.querySelector("#output").textContent = gates.map(key => {
      const value = meta[key];
      let ok = truthyValue(value);
      if (key === "bundleId") ok = /^[A-Za-z0-9]+(?:\.[A-Za-z0-9](?:[A-Za-z0-9-]*[A-Za-z0-9])?)+$/.test(String(value || ""));
      if (key === "version") ok = /^\d+\.\d+(?:\.\d+)?(?:\s+build\s+\d+)?$/i.test(String(value || ""));
      if (key === "screenshots") ok = requiredScreenshots(meta).every(group => screenshotGroups(value).includes(group));
      const detail = key === "screenshots" ? screenshotGroups(value).join(", ") || "missing" : value || "missing";
      return `- [${ok ? "x" : " "}] ${labels[key]}: ${detail}`;
    }).join("\n");
  } catch (error) {
    document.querySelector("#output").textContent = error.message;
  }
};
</script>
</html>
